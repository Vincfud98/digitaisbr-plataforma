<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }

    header {
      background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
      border-bottom: 1px solid #1e293b;
      padding: 32px 40px;
    }

    header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #f8fafc;
    }

    header h1 span { color: #3b82f6; }

    header p {
      margin-top: 6px;
      font-size: 14px;
      color: #94a3b8;
    }

    .legend {
      display: flex;
      gap: 20px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: #cbd5e1;
    }

    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 3px;
    }

    .stats {
      display: flex;
      gap: 16px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .stat {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 13px;
      color: #94a3b8;
    }

    .stat strong {
      font-size: 20px;
      display: block;
      color: #f1f5f9;
    }

    main {
      display: flex;
      gap: 0;
      min-height: calc(100vh - 160px);
    }

    .tree-panel {
      width: 420px;
      min-width: 420px;
      border-right: 1px solid #1e293b;
      overflow-y: auto;
      padding: 16px 0;
    }

    .tree-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      cursor: pointer;
      transition: background 0.15s;
      border-left: 3px solid transparent;
    }

    .tree-item:hover { background: #1e293b; }
    .tree-item.active { background: #1e293b; border-left-color: #3b82f6; }

    .tree-dot {
      width: 8px;
      height: 8px;
      border-radius: 2px;
      flex-shrink: 0;
    }

    .tree-name {
      font-size: 14px;
      font-weight: 500;
      color: #e2e8f0;
    }

    .tree-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: auto;
      flex-shrink: 0;
    }

    .tree-subs {
      padding: 0 20px 0 52px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }

    .tree-subs.open { max-height: 300px; }

    .tree-sub {
      font-size: 12px;
      color: #64748b;
      padding: 2px 0;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tree-sub::before {
      content: '─';
      font-family: monospace;
      color: #334155;
    }

    .detail-panel {
      flex: 1;
      padding: 32px 40px;
      overflow-y: auto;
    }

    .detail-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: #475569;
      font-size: 15px;
      text-align: center;
      gap: 8px;
    }

    .detail-empty svg { opacity: 0.3; }

    .detail-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 8px;
    }

    .detail-header h2 {
      font-size: 22px;
      font-weight: 700;
      color: #f8fafc;
    }

    .detail-obj {
      font-size: 15px;
      color: #94a3b8;
      margin-bottom: 24px;
    }

    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 24px;
    }

    .detail-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 8px;
      padding: 16px;
    }

    .detail-card.full { grid-column: 1 / -1; }

    .detail-card h4 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #64748b;
      margin-bottom: 10px;
    }

    .detail-card p {
      font-size: 13px;
      color: #cbd5e1;
      line-height: 1.6;
    }

    .detail-card ul {
      list-style: none;
      padding: 0;
    }

    .detail-card li {
      font-size: 13px;
      color: #cbd5e1;
      padding: 3px 0;
      display: flex;
      align-items: flex-start;
      gap: 6px;
    }

    .detail-card li::before {
      content: '›';
      color: #475569;
      flex-shrink: 0;
      font-weight: bold;
    }

    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      padding: 4px 10px;
      border-radius: 6px;
      font-size: 12px;
      background: #0f172a;
      border: 1px solid #334155;
      color: #94a3b8;
    }

    .dep-tag {
      display: inline-block;
      padding: 3px 8px;
      border-radius: 4px;
      font-size: 12px;
      background: #3b82f610;
      border: 1px solid #3b82f630;
      color: #60a5fa;
      margin: 2px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .dep-tag:hover { background: #3b82f625; }

    @media (max-width: 900px) {
      main { flex-direction: column; }
      .tree-panel { width: 100%; min-width: 0; border-right: none; border-bottom: 1px solid #1e293b; max-height: 40vh; }
      .detail-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

let activeId = null;

function getName(id) {
  const c = components.find(x => x.id === id);
  return c ? c.name : '';
}

function renderTree() {
  const el = document.getElementById('tree');
  let html = '';
  components.forEach(c => {
    const color = COLORS[c.level];
    const label = LABELS[c.level];
    html += `
      <div class="tree-item" id="item-${c.id}" onclick="selectComponent(${c.id})" style="border-left-color:transparent;">
        <span class="tree-dot" style="background:${color};"></span>
        <span class="tree-name">${c.name}</span>
        <span class="tree-badge" style="background:${color}18;color:${color};">${label}</span>
      </div>
      <div class="tree-subs" id="subs-${c.id}">
        ${c.subs.map(s => `<div class="tree-sub">${s}</div>`).join('')}
      </div>`;
  });
  el.innerHTML = html;
}

function selectComponent(id) {
  if (activeId) {
    const prev = document.getElementById('item-' + activeId);
    if (prev) prev.classList.remove('active');
    const prevSubs = document.getElementById('subs-' + activeId);
    if (prevSubs) prevSubs.classList.remove('open');
  }

  activeId = id;
  const item = document.getElementById('item-' + id);
  if (item) item.classList.add('active');
  const subs = document.getElementById('subs-' + id);
  if (subs) subs.classList.add('open');

  const c = components.find(x => x.id === id);
  if (!c) return;

  const color = COLORS[c.level];
  const label = LABELS[c.level];

  const depsHtml = c.depsText
    ? `<p>${c.depsText}</p>`
    : c.deps.length === 0
      ? '<p>Nenhuma (componente raiz)</p>'
      : `<div style="display:flex;flex-wrap:wrap;gap:4px;">${c.deps.map(d => `<span class="dep-tag" onclick="selectComponent(${d})">${getName(d)}</span>`).join('')}</div>`;

  document.getElementById('detail').innerHTML = `
    <div class="detail-header">
      <span class="tree-dot" style="background:${color};width:12px;height:12px;"></span>
      <h2>${c.name}</h2>
      <span class="tree-badge" style="background:${color}18;color:${color};font-size:12px;padding:3px 10px;">${label}</span>
    </div>
    <p class="detail-obj">${c.obj}</p>

    <div class="detail-grid">
      <div class="detail-card">
        <h4>Funcionalidades</h4>
        <ul>${c.funcs.map(f => `<li>${f}</li>`).join('')}</ul>
      </div>
      <div class="detail-card">
        <h4>Dados que Gerencia</h4>
        <ul>${c.data.map(d => `<li>${d}</li>`).join('')}</ul>
      </div>
      <div class="detail-card">
        <h4>Dependências</h4>
        ${depsHtml}
      </div>
      <div class="detail-card">
        <h4>Subcomponentes</h4>
        <div class="chip-list">${c.subs.map(s => `<span class="chip">${s}</span>`).join('')}</div>
      </div>
      <div class="detail-card full">
        <h4>Regras de Negócio</h4>
        <ul>${c.rules.map(r => `<li>${r}</li>`).join('')}</ul>
      </div>
    </div>`;
}

renderTree();
</script>

</body>
</html>
